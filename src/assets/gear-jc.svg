<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Fondo Circular Oscuro -->
  <circle cx="50" cy="50" r="48" fill="#1e293b" />

  <!-- Definición de Estilos -->
  <style>
    .gear { fill: #2563eb; } /* Azul Corporativo */
    .text { 
      font-family: 'Montserrat', 'Segoe UI', 'Arial Black', sans-serif; 
      font-weight: 900; 
      font-size: 22px; 
      fill: #ffffff; 
      text-anchor: middle; 
    }
  </style>

  <!-- El Engranaje -->
  <g class="gear" transform="translate(50,50)">
    <circle cx="0" cy="0" r="32" />
    <path d="M -6,-38 L 6,-38 L 8,-30 L -8,-30 Z" />
    <path d="M -6,-38 L 6,-38 L 8,-30 L -8,-30 Z" transform="rotate(45)" />
    <path d="M -6,-38 L 6,-38 L 8,-30 L -8,-30 Z" transform="rotate(90)" />
    <path d="M -6,-38 L 6,-38 L 8,-30 L -8,-30 Z" transform="rotate(135)" />
    <path d="M -6,-38 L 6,-38 L 8,-30 L -8,-30 Z" transform="rotate(180)" />
    <path d="M -6,-38 L 6,-38 L 8,-30 L -8,-30 Z" transform="rotate(225)" />
    <path d="M -6,-38 L 6,-38 L 8,-30 L -8,-30 Z" transform="rotate(270)" />
    <path d="M -6,-38 L 6,-38 L 8,-30 L -8,-30 Z" transform="rotate(315)" />
    <circle cx="0" cy="0" r="22" fill="#1e293b" />
  </g>

  <!-- Iniciales JC con ajuste de posición absoluto para evitar fallos de conversión -->
  <text x="50" y="58" class="text">JC</text>
</svg>
